name: edge-pack-modules

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  DOTNET_NOLOGO: true
  EDGE_SHARED_NUGET_FEED: ${{ vars.EDGE_SHARED_NUGET_FEED }}

jobs:
  validate-modules:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Bootstrap NuGet feeds
        shell: pwsh
        run: |
          $localFeed = Join-Path $env:GITHUB_WORKSPACE '.artifacts\nuget'
          $sharedFeed = if ([string]::IsNullOrWhiteSpace($env:EDGE_SHARED_NUGET_FEED)) {
            Join-Path $env:GITHUB_WORKSPACE '.artifacts\shared-feed'
          }
          else {
            $env:EDGE_SHARED_NUGET_FEED
          }

          New-Item -Path $localFeed -ItemType Directory -Force | Out-Null
          New-Item -Path $sharedFeed -ItemType Directory -Force | Out-Null
          "EDGE_SHARED_NUGET_FEED=$sharedFeed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build injection module
        shell: pwsh
        run: dotnet build src/Modules/IIoT.Edge.Module.Injection/IIoT.Edge.Module.Injection.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Build stacking module
        shell: pwsh
        run: dotnet build src/Modules/IIoT.Edge.Module.Stacking/IIoT.Edge.Module.Stacking.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Build dry-run module
        shell: pwsh
        run: dotnet build src/Tools/ModuleSamples/IIoT.Edge.Module.DryRun/IIoT.Edge.Module.DryRun.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Run module contract tests
        shell: pwsh
        run: dotnet test src/Tests/IIoT.Edge.Module.ContractTests/IIoT.Edge.Module.ContractTests.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Run host contract baseline
        shell: pwsh
        run: dotnet test src/Tests/IIoT.Edge.Shell.Tests/IIoT.Edge.Shell.Tests.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Run non-UI regression tests
        shell: pwsh
        run: dotnet test src/Tests/IIoT.Edge.NonUiRegressionTests/IIoT.Edge.NonUiRegressionTests.csproj -p:BuildInParallel=false --disable-build-servers

  pack-modules:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    needs: validate-modules
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Bootstrap NuGet feeds
        shell: pwsh
        run: |
          $localFeed = Join-Path $env:GITHUB_WORKSPACE '.artifacts\nuget'
          $sharedFeed = if ([string]::IsNullOrWhiteSpace($env:EDGE_SHARED_NUGET_FEED)) {
            Join-Path $env:GITHUB_WORKSPACE '.artifacts\shared-feed'
          }
          else {
            $env:EDGE_SHARED_NUGET_FEED
          }

          New-Item -Path $localFeed -ItemType Directory -Force | Out-Null
          New-Item -Path $sharedFeed -ItemType Directory -Force | Out-Null
          "EDGE_SHARED_NUGET_FEED=$sharedFeed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Pack module packages
        shell: pwsh
        run: |
          if ($env:EDGE_SHARED_NUGET_FEED) {
            ./scripts/PackEdgePackages.ps1 -Group modules -Configuration Release -PublishSharedFeed
          }
          else {
            ./scripts/PackEdgePackages.ps1 -Group modules -Configuration Release
          }

      - name: Upload packed module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edge-module-packages
          path: .artifacts/nuget/*.nupkg
