name: edge-pack-sdk

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  DOTNET_NOLOGO: true
  EDGE_SHARED_NUGET_FEED: ${{ vars.EDGE_SHARED_NUGET_FEED }}

jobs:
  validate-sdk:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Bootstrap NuGet feeds
        shell: pwsh
        run: |
          $localFeed = Join-Path $env:GITHUB_WORKSPACE '.artifacts\nuget'
          $sharedFeed = if ([string]::IsNullOrWhiteSpace($env:EDGE_SHARED_NUGET_FEED)) {
            Join-Path $env:GITHUB_WORKSPACE '.artifacts\shared-feed'
          }
          else {
            $env:EDGE_SHARED_NUGET_FEED
          }

          New-Item -Path $localFeed -ItemType Directory -Force | Out-Null
          New-Item -Path $sharedFeed -ItemType Directory -Force | Out-Null
          "EDGE_SHARED_NUGET_FEED=$sharedFeed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build module abstractions
        shell: pwsh
        run: dotnet build src/Shared/IIoT.Edge.Module.Abstractions/IIoT.Edge.Module.Abstractions.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Build host bootstrap
        shell: pwsh
        run: dotnet build src/Edge/IIoT.Edge.Host.Bootstrap/IIoT.Edge.Host.Bootstrap.csproj -p:BuildInParallel=false --disable-build-servers

      - name: Run host contract baseline
        shell: pwsh
        run: dotnet test src/Tests/IIoT.Edge.Shell.Tests/IIoT.Edge.Shell.Tests.csproj -p:BuildInParallel=false --disable-build-servers

  pack-sdk:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    needs: validate-sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Bootstrap NuGet feeds
        shell: pwsh
        run: |
          $localFeed = Join-Path $env:GITHUB_WORKSPACE '.artifacts\nuget'
          $sharedFeed = if ([string]::IsNullOrWhiteSpace($env:EDGE_SHARED_NUGET_FEED)) {
            Join-Path $env:GITHUB_WORKSPACE '.artifacts\shared-feed'
          }
          else {
            $env:EDGE_SHARED_NUGET_FEED
          }

          New-Item -Path $localFeed -ItemType Directory -Force | Out-Null
          New-Item -Path $sharedFeed -ItemType Directory -Force | Out-Null
          "EDGE_SHARED_NUGET_FEED=$sharedFeed" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Pack reusable SDK and host packages
        shell: pwsh
        run: |
          if ($env:EDGE_SHARED_NUGET_FEED) {
            ./scripts/PackEdgePackages.ps1 -Group sdk -Configuration Release -CleanOutput -PublishSharedFeed
          }
          else {
            ./scripts/PackEdgePackages.ps1 -Group sdk -Configuration Release -CleanOutput
          }

      - name: Upload packed SDK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edge-sdk-packages
          path: .artifacts/nuget/*.nupkg
